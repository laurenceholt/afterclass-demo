<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" font-family="Inter, system-ui, sans-serif">
  <!-- Video player background -->
  <rect width="320" height="180" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>

  <!-- Whiteboard area -->
  <rect x="12" y="12" width="296" height="130" rx="4" fill="#fff"/>

  <!-- Title -->
  <text x="160" y="30" text-anchor="middle" fill="#333" font-size="10" font-weight="700">Calculating Slope from Two Points</text>
  <line x1="80" y1="34" x2="240" y2="34" stroke="#6366f1" stroke-width="2" opacity="0.4"/>

  <!-- Coordinate grid (simplified) -->
  <g opacity="0.12" stroke="#999" stroke-width="0.5">
    <line x1="30" y1="50" x2="30" y2="130"/>
    <line x1="60" y1="50" x2="60" y2="130"/>
    <line x1="90" y1="50" x2="90" y2="130"/>
    <line x1="120" y1="50" x2="120" y2="130"/>
    <line x1="150" y1="50" x2="150" y2="130"/>
    <line x1="30" y1="130" x2="150" y2="130"/>
    <line x1="30" y1="110" x2="150" y2="110"/>
    <line x1="30" y1="90" x2="150" y2="90"/>
    <line x1="30" y1="70" x2="150" y2="70"/>
    <line x1="30" y1="50" x2="150" y2="50"/>
  </g>
  <!-- Axes -->
  <line x1="30" y1="50" x2="30" y2="132" stroke="#555" stroke-width="1.5"/>
  <line x1="28" y1="130" x2="152" y2="130" stroke="#555" stroke-width="1.5"/>

  <!-- Points -->
  <circle cx="60" cy="110" r="5" fill="#dc2626" stroke="#fff" stroke-width="1.5"/>
  <text x="68" y="106" fill="#dc2626" font-size="8" font-weight="600">(2, −1)</text>
  <circle cx="120" cy="70" r="5" fill="#dc2626" stroke="#fff" stroke-width="1.5"/>
  <text x="128" y="66" fill="#dc2626" font-size="8" font-weight="600">(6, 1)</text>

  <!-- Line connecting points -->
  <line x1="30" y1="130" x2="150" y2="50" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <!-- Rise/Run annotations -->
  <line x1="60" y1="110" x2="60" y2="70" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="60" y1="70" x2="120" y2="70" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="42" y="92" fill="#22c55e" font-size="8" font-weight="700">rise</text>
  <text x="42" y="100" fill="#22c55e" font-size="7">= 2</text>
  <text x="82" y="64" fill="#f97316" font-size="8" font-weight="700">run = 4</text>

  <!-- Formula on right side -->
  <rect x="170" y="48" width="130" height="88" rx="6" fill="#f8f9fa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="235" y="64" text-anchor="middle" fill="#555" font-size="8" font-weight="600">FORMULA</text>

  <text x="180" y="80" fill="#333" font-size="10" font-weight="600">slope = </text>
  <line x1="230" y1="70" x2="284" y2="70" stroke="#333" stroke-width="1"/>
  <text x="257" y="68" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">y₂ − y₁</text>
  <text x="257" y="84" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">x₂ − x₁</text>

  <text x="195" y="102" fill="#333" font-size="10">= </text>
  <line x1="206" y1="93" x2="260" y2="93" stroke="#333" stroke-width="1"/>
  <text x="233" y="92" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">1−(−1)</text>
  <text x="233" y="107" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">6 − 2</text>

  <text x="270" y="102" fill="#333" font-size="10">= </text>
  <text x="290" y="100" text-anchor="middle" fill="#6366f1" font-size="14" font-weight="700">½</text>

  <!-- Video controls bar -->
  <rect x="0" y="148" width="320" height="32" rx="0" fill="rgba(0,0,0,0.6)"/>
  <!-- Play button -->
  <polygon points="20,158 20,172 30,165" fill="#fff"/>
  <!-- Progress bar -->
  <rect x="40" y="163" width="220" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="40" y="163" width="154" height="4" rx="2" fill="#dc2626"/>
  <circle cx="194" cy="165" r="5" fill="#dc2626"/>
  <!-- Time -->
  <text x="268" y="168" fill="#ccc" font-size="8">3:24 / 4:47</text>
</svg>
